<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI PM Summit · April 22, 2026</title>
  <meta name="description" content="The AI PM Summit — April 22, 2026. Virtual. Join the waitlist." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,900;1,900&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: #f5f1e8;
      color: #1a0f0a;
      -webkit-font-smoothing: antialiased;
    }

    /* ── WAVY LINES ─────────────────────────────────── */
    .waves {
      position: fixed;
      top: 0;
      bottom: 0;
      width: 240px;
      z-index: 0;
      pointer-events: none;
      overflow: visible;
    }

    .waves-left {
      left: 0;
      -webkit-mask-image: linear-gradient(to right, black 25%, transparent 100%);
      mask-image: linear-gradient(to right, black 25%, transparent 100%);
    }

    .waves-right {
      right: 0;
      transform: scaleX(-1);
      -webkit-mask-image: linear-gradient(to right, black 25%, transparent 100%);
      mask-image: linear-gradient(to right, black 25%, transparent 100%);
    }

    .waves svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    /* ── HERO ───────────────────────────────────────── */
    .hero {
      position: fixed;
      inset: 0;
      z-index: 1;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .hero-top {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 2;
    }

    /* ── HEADLINE ───────────────────────────────────── */
    h1 {
      font-size: clamp(48px, 8vw, 124px);
      font-weight: 900;
      line-height: 0.9;
      letter-spacing: -0.04em;
      color: #1a0f0a;
      /* Sticker effect: cream border + drop shadow */
      -webkit-text-stroke: 10px #f5f1e8;
      paint-order: stroke fill;
      filter: drop-shadow(5px 5px 0 rgba(0,0,0,0.13));
    }

    /* ── TAGLINE ─────────────────────────────────────── */
    .tagline {
      margin-top: 22px;
      font-size: clamp(16px, 1.6vw, 22px);
      font-weight: 600;
      color: #1a0f0a;
      letter-spacing: -0.02em;
      line-height: 1.4;
      max-width: 600px;
      opacity: 0.75;
    }

    /* ── WAITLIST FORM ────────────────────────────── */
    .waitlist-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-top: 28px;
    }

    #wl-form {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fff;
      border: 2.5px solid #1a0f0a;
      border-radius: 100px;
      padding: 8px 8px 8px 22px;
      box-shadow: 4px 4px 0 #1a0f0a;
    }

    .form-inputs {
      display: flex;
      align-items: center;
    }

    #wl-form input {
      background: none;
      border: none;
      outline: none;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: #1a0f0a;
      width: 148px;
      padding: 4px 0;
    }

    #wl-form input::placeholder { color: #b0a090; }

    .input-sep {
      width: 1px;
      height: 18px;
      background: rgba(26,15,10,0.18);
      margin: 0 12px;
    }

    .btn-arrow {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #e8603a;
      color: #fff;
      border: 2.5px solid #1a0f0a;
      border-radius: 100px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.1s, box-shadow 0.1s;
      box-shadow: 2px 2px 0 #1a0f0a;
    }

    .btn-arrow:hover {
      transform: translate(-1px, -1px);
      box-shadow: 3px 3px 0 #1a0f0a;
    }

    .btn-arrow:active {
      transform: translate(1px, 1px);
      box-shadow: 1px 1px 0 #1a0f0a;
    }

    .form-note {
      font-size: 11px;
      color: rgba(26,15,10,0.38);
      font-weight: 500;
    }

    /* ── SUCCESS ──────────────────────────────────── */
    .wl-success {
      display: none;
      background: #fff;
      border: 2.5px solid #1a0f0a;
      border-radius: 100px;
      padding: 13px 28px;
      font-size: 14px;
      font-weight: 700;
      color: #1a0f0a;
      box-shadow: 4px 4px 0 #1a0f0a;
    }

    /* ── RETRO TV ────────────────────────────────────── */
    .tv {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .tv-antennas {
      display: flex;
      justify-content: center;
      gap: 22px;
      align-items: flex-end;
      height: 34px;
      margin-bottom: -1px;
    }

    .antenna {
      width: 3px;
      height: 32px;
      background: #1a0f0a;
      border-radius: 2px 2px 0 0;
    }

    .antenna-l { transform: rotate(-18deg); transform-origin: bottom center; }
    .antenna-r { transform: rotate(18deg);  transform-origin: bottom center; }

    .tv-body {
      background: #fff8ee;
      border: 3px solid #1a0f0a;
      border-radius: 32px 32px 22px 22px;
      box-shadow: 4px 4px 0 #1a0f0a;
      padding: 14px 14px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .tv-screen {
      background: #f0e6d0;
      border: 2px solid #1a0f0a;
      border-radius: 16px;
      padding: 11px 18px 13px;
      text-align: center;
      min-width: 148px;
      box-shadow: inset 2px 2px 3px rgba(0,0,0,0.07);
    }

    .location-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(26,15,10,0.4);
      margin-bottom: 4px;
    }

    .location-val {
      font-size: 17px;
      font-weight: 900;
      line-height: 1.2;
      letter-spacing: -0.025em;
      color: #1a0f0a;
    }

    .location-val em { font-style: italic; }

    .tv-knobs {
      display: flex;
      flex-direction: column;
      gap: 7px;
      padding-right: 4px;
    }

    .tv-knob {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      border: 2px solid #1a0f0a;
      box-shadow: 1px 1px 0 #1a0f0a;
    }

    .tv-knob:nth-child(1) { background: #e8603a; }
    .tv-knob:nth-child(2) { background: #e8739a; }

    .tv-legs {
      display: flex;
      justify-content: space-around;
      width: 70%;
    }

    .tv-leg {
      width: 11px;
      height: 12px;
      background: #1a0f0a;
      border-radius: 0 0 5px 5px;
    }

    /* ── RESPONSIVE ───────────────────────────────── */
    @media (max-width: 768px) {
      html, body { overflow: auto; }
      .hero { position: relative; min-height: 100vh; padding: 60px 24px 120px; }
      h1 { font-size: 13vw; -webkit-text-stroke: 6px #f5f1e8; }
      .tagline { border-radius: 16px; font-size: 14px; }
      .waves { display: none; }

      #wl-form {
        flex-direction: column;
        border-radius: 20px;
        padding: 16px;
        align-items: stretch;
        width: 100%;
        max-width: 380px;
        box-shadow: 3px 3px 0 #1a0f0a;
      }

      .form-inputs { flex-direction: column; gap: 10px; }
      #wl-form input { width: 100%; }
      .input-sep { width: 100%; height: 1px; margin: 4px 0; }
      .btn-arrow { justify-content: center; }
      .waitlist-wrap { width: 100%; align-items: center; }
    }
  </style>
</head>
<body>

<!-- Hero -->
<div class="hero">
  <div class="hero-top">
    <h1>The AI PM Summit<br>April 22, 2026</h1>
    <p class="tagline">When building software costs nothing, deciding what to build is everything. Master the new era of Product Management.</p>
    <div class="waitlist-wrap">
      <form id="wl-form" onsubmit="joinList(event)">
        <div class="form-inputs">
          <input type="text"  id="wl-name"  placeholder="First name"   required autocomplete="given-name" />
          <div class="input-sep"></div>
          <input type="email" id="wl-email" placeholder="Email address" required autocomplete="email" />
        </div>
        <button type="submit" class="btn-arrow">Join the waitlist</button>
      </form>
      <div class="wl-success" id="wl-success">You're on the list ✓</div>
      <p class="form-note">No spam, ever</p>
    </div>
  </div>

  <div class="tv">
    <div class="tv-antennas">
      <div class="antenna antenna-l"></div>
      <div class="antenna antenna-r"></div>
    </div>
    <div class="tv-body">
      <div class="tv-screen">
        <div class="location-label">Format</div>
        <div class="location-val">Virtual,<br><em>Live &amp; On-Demand</em></div>
      </div>
      <div class="tv-knobs">
        <div class="tv-knob"></div>
        <div class="tv-knob"></div>
      </div>
    </div>
    <div class="tv-legs">
      <div class="tv-leg"></div>
      <div class="tv-leg"></div>
    </div>
  </div>
</div>

<script>
  async function joinList(e) {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    btn.textContent = 'Joining...';
    btn.disabled = true;

    const name  = document.getElementById('wl-name').value.trim();
    const email = document.getElementById('wl-email').value.trim();

    try {
      const res = await fetch('https://api.convertkit.com/v3/forms/9201239/subscribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          api_key: 'WFicEfSL4QrstYEfcsffxA',
          email: email,
          first_name: name
        })
      });

      if (res.ok) {
        document.getElementById('wl-form').style.display = 'none';
        document.getElementById('wl-success').style.display = 'block';
      } else {
        btn.textContent = 'Try again';
        btn.disabled = false;
      }
    } catch {
      btn.textContent = 'Try again';
      btn.disabled = false;
    }
  }
</script>
