<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI PM Summit · April 22, 2026</title>
  <meta name="description" content="The AI PM Summit — April 22, 2026. Virtual. Join the waitlist." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,900;1,900&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: #f5f1e8;
      color: #1a0f0a;
      -webkit-font-smoothing: antialiased;
    }

    /* ── ARCH RINGS ─────────────────────────────────── */
    .arch-group {
      position: fixed;
      top: 0; bottom: 0;
      width: 0;
      z-index: 0;
      pointer-events: none;
    }

    .arch-left  { left: 0; }
    .arch-right { right: 0; }

    .ring {
      position: absolute;
      top: 50%;
      border-radius: 50%;
      border-style: solid;
      border-width: 22px;
    }

    /* Left rings — circles whose centers sit off-screen left */
    .arch-left .r1 { width: 500px; height: 500px; left: -390px; margin-top: -250px; border-color: #e8739a; }
    .arch-left .r2 { width: 400px; height: 400px; left: -315px; margin-top: -200px; border-color: #e8603a; }
    .arch-left .r3 { width: 300px; height: 300px; left: -240px; margin-top: -150px; border-color: #f0b030; }
    .arch-left .r4 { width: 200px; height: 200px; left: -165px; margin-top: -100px; border-color: #f5ce3a; }

    /* Right rings — circles whose centers sit off-screen right */
    .arch-right .r1 { width: 500px; height: 500px; right: -390px; margin-top: -250px; border-color: #e8739a; }
    .arch-right .r2 { width: 400px; height: 400px; right: -315px; margin-top: -200px; border-color: #e8603a; }
    .arch-right .r3 { width: 300px; height: 300px; right: -240px; margin-top: -150px; border-color: #f0b030; }
    .arch-right .r4 { width: 200px; height: 200px; right: -165px; margin-top: -100px; border-color: #f5ce3a; }

    /* ── HERO ───────────────────────────────────────── */
    .hero {
      position: fixed;
      inset: 0;
      z-index: 1;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .hero-top {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 2;
    }

    /* ── HEADLINE ───────────────────────────────────── */
    h1 {
      font-size: clamp(48px, 8vw, 124px);
      font-weight: 900;
      line-height: 0.9;
      letter-spacing: -0.04em;
      color: #1a0f0a;
      /* Sticker effect: cream border + drop shadow */
      -webkit-text-stroke: 10px #f5f1e8;
      paint-order: stroke fill;
      filter: drop-shadow(5px 5px 0 rgba(0,0,0,0.13));
    }

    /* ── TAGLINE ─────────────────────────────────────── */
    .tagline {
      margin-top: 28px;
      display: inline-block;
      background: #e8603a;
      color: #fff;
      font-size: clamp(13px, 1.15vw, 16px);
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.45;
      padding: 13px 26px;
      border-radius: 100px;
      border: 2.5px solid #1a0f0a;
      box-shadow: 3px 3px 0 #1a0f0a;
      max-width: 540px;
    }

    /* ── WAITLIST FORM ────────────────────────────── */
    .waitlist-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-top: 28px;
    }

    #wl-form {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fff;
      border: 2.5px solid #1a0f0a;
      border-radius: 100px;
      padding: 8px 8px 8px 22px;
      box-shadow: 4px 4px 0 #1a0f0a;
    }

    .form-inputs {
      display: flex;
      align-items: center;
    }

    #wl-form input {
      background: none;
      border: none;
      outline: none;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: #1a0f0a;
      width: 148px;
      padding: 4px 0;
    }

    #wl-form input::placeholder { color: #b0a090; }

    .input-sep {
      width: 1px;
      height: 18px;
      background: rgba(26,15,10,0.18);
      margin: 0 12px;
    }

    .btn-arrow {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #e8603a;
      color: #fff;
      border: 2.5px solid #1a0f0a;
      border-radius: 100px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.1s, box-shadow 0.1s;
      box-shadow: 2px 2px 0 #1a0f0a;
    }

    .btn-arrow:hover {
      transform: translate(-1px, -1px);
      box-shadow: 3px 3px 0 #1a0f0a;
    }

    .btn-arrow:active {
      transform: translate(1px, 1px);
      box-shadow: 1px 1px 0 #1a0f0a;
    }

    .form-note {
      font-size: 11px;
      color: rgba(26,15,10,0.38);
      font-weight: 500;
    }

    /* ── SUCCESS ──────────────────────────────────── */
    .wl-success {
      display: none;
      background: #fff;
      border: 2.5px solid #1a0f0a;
      border-radius: 100px;
      padding: 13px 28px;
      font-size: 14px;
      font-weight: 700;
      color: #1a0f0a;
      box-shadow: 4px 4px 0 #1a0f0a;
    }

    /* ── BOTTOM INFO ─────────────────────────────────── */
    .bottom-row {
      position: absolute;
      bottom: 32px;
      left: 40px;
      z-index: 2;
    }

    .location-box {
      background: #fff;
      border: 2.5px solid #1a0f0a;
      color: #1a0f0a;
      padding: 12px 18px 14px;
      border-radius: 16px;
      box-shadow: 3px 3px 0 #1a0f0a;
    }

    .location-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(26,15,10,0.4);
      margin-bottom: 5px;
    }

    .location-val {
      font-size: 18px;
      font-weight: 900;
      line-height: 1.15;
      letter-spacing: -0.025em;
    }

    .location-val em {
      font-style: italic;
    }

    /* ── RESPONSIVE ───────────────────────────────── */
    @media (max-width: 768px) {
      html, body { overflow: auto; }
      .hero { position: relative; min-height: 100vh; padding: 60px 24px 120px; }
      h1 { font-size: 13vw; -webkit-text-stroke: 6px #f5f1e8; }
      .tagline { border-radius: 16px; font-size: 14px; }
      .arch-group { display: none; }

      #wl-form {
        flex-direction: column;
        border-radius: 20px;
        padding: 16px;
        align-items: stretch;
        width: 100%;
        max-width: 380px;
        box-shadow: 3px 3px 0 #1a0f0a;
      }

      .form-inputs { flex-direction: column; gap: 10px; }
      #wl-form input { width: 100%; }
      .input-sep { width: 100%; height: 1px; margin: 4px 0; }
      .btn-arrow { justify-content: center; }
      .waitlist-wrap { width: 100%; align-items: center; }
    }
  </style>
</head>
<body>

<!-- Arch rings -->
<div class="arch-group arch-left">
  <div class="ring r1"></div>
  <div class="ring r2"></div>
  <div class="ring r3"></div>
  <div class="ring r4"></div>
</div>
<div class="arch-group arch-right">
  <div class="ring r1"></div>
  <div class="ring r2"></div>
  <div class="ring r3"></div>
  <div class="ring r4"></div>
</div>

<!-- Hero -->
<div class="hero">
  <div class="hero-top">
    <h1>The AI PM Summit<br>April 22, 2026</h1>
    <p class="tagline">When building software costs nothing, deciding what to build is everything. Master the new era of Product Management.</p>
    <div class="waitlist-wrap">
      <form id="wl-form" onsubmit="joinList(event)">
        <div class="form-inputs">
          <input type="text"  id="wl-name"  placeholder="First name"   required autocomplete="given-name" />
          <div class="input-sep"></div>
          <input type="email" id="wl-email" placeholder="Email address" required autocomplete="email" />
        </div>
        <button type="submit" class="btn-arrow">Join the waitlist</button>
      </form>
      <div class="wl-success" id="wl-success">You're on the list ✓</div>
      <p class="form-note">No spam, ever</p>
    </div>
  </div>

  <div class="bottom-row">
    <div class="location-box">
      <div class="location-label">Format</div>
      <div class="location-val">Virtual,<br><em>Live &amp; On-Demand</em></div>
    </div>
  </div>
</div>

<script>
  async function joinList(e) {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    btn.textContent = 'Joining...';
    btn.disabled = true;

    const name  = document.getElementById('wl-name').value.trim();
    const email = document.getElementById('wl-email').value.trim();

    try {
      const res = await fetch('https://api.convertkit.com/v3/forms/9201239/subscribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          api_key: 'WFicEfSL4QrstYEfcsffxA',
          email: email,
          first_name: name
        })
      });

      if (res.ok) {
        document.getElementById('wl-form').style.display = 'none';
        document.getElementById('wl-success').style.display = 'block';
      } else {
        btn.textContent = 'Try again';
        btn.disabled = false;
      }
    } catch {
      btn.textContent = 'Try again';
      btn.disabled = false;
    }
  }
</script>

</body>
</html>
